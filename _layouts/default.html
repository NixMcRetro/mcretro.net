<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="{{ '/assets/favicon/favicon-96x96.png' | relative_url }}" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon/favicon.svg' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/assets/favicon/site.webmanifest' | relative_url }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }} - {% if page.title %}{{ page.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/overrides.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  {% include header.html %}
  <div class="site-content">
    <main class="content-area">
      {{ content }}
    </main>
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>
  </div>
  {% include footer.html %}

<script src="{{ '/assets/js/confetti.js' | relative_url }}"></script>
<script src="{{ '/assets/js/rotating-tag-cloud.js' | relative_url }}"></script>

<script>
  (function() {
    // Build the array of all post URLs (generated by Jekyll)
    var postUrls = [
      {% for post in site.posts %}
        "{{ post.url }}"{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];

    // Wait for the DOM to be ready
    function ready(fn) {
      if (document.readyState !== 'loading') {
        fn();
      } else {
        document.addEventListener('DOMContentLoaded', fn);
      }
    }

    ready(function() {
      var link = document.getElementById('random-post-link');
      if (link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          if (postUrls.length === 0) return;
          var randomIndex = Math.floor(Math.random() * postUrls.length);
          window.location.href = postUrls[randomIndex];
        });
      }
    });
  })();
</script>

<script>
  (function() {
    var toggle = document.querySelector('.nav-toggle');
    var nav = document.querySelector('[data-nav]');

    if (!toggle || !nav) return;

    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      var isOpen = nav.getAttribute('data-nav') === 'open';
      // Toggle the menu state on the nav
      nav.setAttribute('data-nav', isOpen ? '' : 'open');
      // Toggle the open class on the button (for the X animation)
      toggle.classList.toggle('open', !isOpen);
      toggle.setAttribute('aria-expanded', !isOpen);
    });

    // Close when clicking outside
    document.addEventListener('click', function(e) {
      if (!nav.contains(e.target) && e.target !== toggle && nav.getAttribute('data-nav') === 'open') {
        nav.setAttribute('data-nav', '');
        toggle.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>

</body>
</html>
