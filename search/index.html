---
layout: default
title: Search
---
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">

<div class="center">
  <img src="/assets/images/search/search.gif" alt="Let's go searching!" width="35" height="35">
</div>

<script src="/pagefind/pagefind-ui.js"></script>
<div id="search"></div>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    console.log('Pagefind script running…');
    console.log('PagefindUI available:', typeof PagefindUI);

    const params = new URLSearchParams(window.location.search);
    const query = params.get('q') || '';
    console.log('Search query:', query);

    if (typeof PagefindUI === 'undefined') {
      console.error('PagefindUI not found – is pagefind-ui.js loading?');
      return;
    }

    new PagefindUI({
      element: "#search",
      showSubResults: true,
      showImages: false,
      initialSearchValue: query
    });
  });
</script>
