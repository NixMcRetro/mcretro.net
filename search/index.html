---
layout: default
title: Search
---
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">

<div class="center">
  <img src="/assets/images/search/search.gif" alt="Let's go searching!" width="35" height="35">
</div>

<script src="/pagefind/pagefind-ui.js"></script>
<div id="search"></div>
<script>
  window.addEventListener('DOMContentLoaded', (event) => {
    // Read the ?q= parameter from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q') || '';

    new PagefindUI({
      element: "#search",
      showSubResults: true,
      showImages: false,
      initialSearchValue: query   // triggers search immediately
    });
  });
</script>
